name: Release

# Publish when pushing a semver tag (e.g. v1.2.3). Bump package.json version before tagging.
on:
  push:
    tags: ['v*']

jobs:
  ci:
    uses: ./.github/workflows/ci.yaml

  release:
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: pnpm

      - run: pnpm install

      - run: pnpm typecheck

      # npm 10+：预发布版本（含 -alpha/-beta/-rc 等）必须显式指定 dist-tag，不能默认发到 latest
      - run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            pnpm publish --no-git-checks --access public --tag alpha
          else
            pnpm publish --no-git-checks --access public
          fi

      - run: pnpx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
